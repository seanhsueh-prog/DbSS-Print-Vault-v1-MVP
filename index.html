<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0B0B0B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    
    <title>DbSS Print Vault v2.7</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- 基礎環境 --- */
        html, body, #root { 
            width: 100%; height: 100dvh; margin: 0; padding: 0; 
            overflow: hidden; background: #0B0B0B; 
            font-family: 'Inter', sans-serif; color: #F2F2F2;
            -webkit-font-smoothing: antialiased;
        }
        .app-container { 
            width: 100%; max-width: 480px; height: 100%; 
            display: flex; flex-direction: column; 
            background: #0B0B0B; margin: 0 auto; position: relative; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- 1. 開場動畫 (震撼滿版版) --- */
        .splash-layer {
            position: fixed; inset: 0; z-index: 9999;
            background: #0B0B0B; display: flex; align-items: center; justify-content: center;
            opacity: 1; pointer-events: auto;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .splash-layer.fade-out { opacity: 0; pointer-events: none; }
        .splash-img { 
            width: 100%; height: 100%; 
            object-fit: contain; 
            padding: 0;
            transform: scale(1.05);
        }

        /* --- 2. 標誌與導覽 --- */
        .header-logo { height: 42px; object-fit: contain; margin-bottom: 8px; }
        
        .tab-bar {
            display: flex; width: 100%; border-bottom: 1px solid #1a1a1a;
            background: #0B0B0B; position: sticky; top: 0; z-index: 40;
        }
        .tab-item {
            flex: 1; text-align: center; padding: 16px 0; font-size: 10px;
            color: #8A8A8A; letter-spacing: 0.5px; cursor: pointer;
            transition: all 0.3s; text-transform: uppercase;
        }
        .tab-item.active { color: #F2F2F2; border-bottom: 2px solid #C6A96A; }

        /* --- 3. 網格設計 --- */
        .main-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
            background: #1a1a1a; padding-bottom: 140px;
        }
        .grid-cell { 
            background: #1C1C1C; 
            aspect-ratio: 3/4; overflow: hidden; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .grid-cell img {
            width: 100%; height: 100%; object-fit: contain; padding: 10px;
            transition: opacity 0.4s ease; opacity: 0;
        }
        .grid-cell img.loaded { opacity: 1; }

        /* --- 4. 數位鋼印 (修正：z-index 提高，確保在圖片最上層) --- */
        .watermark-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; user-select: none;
            z-index: 100; /* 高於圖片的 z-index */
        }
        .watermark-text {
            transform: rotate(-35deg);
            font-size: 11vw; font-weight: 700; letter-spacing: 0.25em;
            color: rgba(255, 255, 255, 0.035); /* 極淡鋼印 */
            white-space: nowrap;
        }

        /* --- 5. 底部導覽列 --- */
        .bottom-nav {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(11, 11, 11, 0.98); border-top: 1px solid #1a1a1a;
            display: flex; justify-content: space-evenly;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
            padding-top: 16px; z-index: 60;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .nav-btn {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            color: #8A8A8A; transition: color 0.3s; cursor: pointer;
        }
        .nav-btn.active { color: #C6A96A; }

        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const CATEGORIES = [
            { id: 'li', label: 'Line Art', prefix: 'li', count: 18 },
            { id: 'in', label: 'Ink Art', prefix: 'in', count: 18 },
            { id: 'ch', label: 'Characters', prefix: 'ch', count: 15 },
            { id: 'an', label: 'Anime', prefix: 'an', count: 15 },
            { id: 'am', label: 'Animals', prefix: 'am', count: 12 }
        ];

        // 智慧圖檔載入器
        const SmartImage = ({ prefix, index, onSelectItem }) => {
            const [errorStep, setErrorStep] = useState(0);
            const [loaded, setLoaded] = useState(false);

            const candidates = useMemo(() => {
                const sIdx = String(index);
                const p = prefix.toLowerCase();
                const P = prefix.toUpperCase();
                return [
                    `./${p}${sIdx.padStart(3, '0')}.png`,    // li001.png
                    `./${P}-${index}.png`,                 // LI-1.png
                    `./${p}${index}.png`,                   // li1.png
                    `./${p}${sIdx.padStart(3, '0')}_d.png`  // li001_d.png
                ];
            }, [prefix, index]);

            const handleError = () => {
                if (errorStep < candidates.length - 1) {
                    setErrorStep(prev => prev + 1);
                }
            };

            return (
                <div className="grid-cell" onClick={() => onSelectItem(candidates[errorStep], index)}>
                    <img 
                        src={candidates[errorStep]} 
                        className={loaded ? 'loaded' : ''}
                        onLoad={() => setLoaded(true)}
                        onError={handleError}
                        loading="lazy"
                    />
                </div>
            );
        };

        const App = () => {
            const [page, setPage] = useState('archive');
            const [filter, setFilter] = useState('li');
            const [splashActive, setSplashActive] = useState(true);
            const [splashFade, setSplashFade] = useState(false);
            const [selectedItem, setSelectedItem] = useState(null);

            useEffect(() => {
                const t1 = setTimeout(() => setSplashFade(true), 2000);
                const t2 = setTimeout(() => setSplashActive(false), 2800);
                return () => { clearTimeout(t1); clearTimeout(t2); };
            }, []);

            const currentCategory = useMemo(() => CATEGORIES.find(c => c.id === filter), [filter]);

            return (
                <div className="app-container pt-[env(safe-area-inset-top)]">
                    
                    {/* 1. 開場動畫 */}
                    {splashActive && (
                        <div className={`splash-layer ${splashFade ? 'fade-out' : ''}`}>
                            <img src="./splash-dbss.png" className="splash-img" alt="DbSS" />
                        </div>
                    )}

                    {/* 2. 頁面內容：ARCHIVE */}
                    {page === 'archive' && (
                        <>
                            <header className="pt-8 pb-5 flex flex-col items-center">
                                <img src="./logo-dbss.png" className="header-logo" alt="DbSS" />
                                <span className="text-[9px] tracking-[0.2em] text-[#8A8A8A] uppercase font-light">Archive Foundation</span>
                            </header>

                            <nav className="tab-bar">
                                {CATEGORIES.map(cat => (
                                    <div key={cat.id} 
                                         onClick={() => setFilter(cat.id)}
                                         className={`tab-item ${filter === cat.id ? 'active' : ''}`}>
                                        {cat.label}
                                    </div>
                                ))}
                            </nav>

                            <main className="flex-1 overflow-y-auto no-scrollbar">
                                <div className="main-grid">
                                    {[...Array(currentCategory.count)].map((_, i) => (
                                        <SmartImage 
                                            key={`${filter}-${i}`} 
                                            prefix={currentCategory.prefix} 
                                            index={i + 1} 
                                            onSelectItem={(path, id) => setSelectedItem({ path, id: `${currentCategory.label.toUpperCase()}-${id}` })}
                                        />
                                    ))}
                                </div>
                            </main>
                        </>
                    )}

                    {/* 3. 頁面內容：ABOUT */}
                    {page === 'info' && (
                        <div className="flex-1 flex flex-col items-center justify-center p-12 text-center fade-in">
                            <img src="./logo-dbss.png" className="h-10 mb-12 opacity-90" />
                            <div className="w-8 h-[1px] bg-[#C6A96A] mb-12"></div>
                            <p className="text-[13px] text-[#F2F2F2] leading-relaxed font-light tracking-wide mb-6">
                                DbSS STUDIO: Premium Design Archive for visionary apparel creators.
                            </p>
                            <p className="text-[11px] text-[#8A8A8A] leading-relaxed font-light">
                                Optimized at 4500x5400 px / 300 DPI.<br/>
                                Built for high-performance garment printing.
                            </p>
                            <div className="mt-20 py-2 px-6 border border-[#1a1a1a] rounded-full">
                                <span className="text-[9px] text-[#555] tracking-widest uppercase">Version 2.7.0 Stable</span>
                            </div>
                        </div>
                    )}

                    {/* 4. 詳情彈窗 (修正：浮水印位在圖片上層) */}
                    {selectedItem && (
                        <div className="fixed inset-0 z-[100] bg-[#0B0B0B] fade-in flex flex-col">
                            <div className="p-6 flex justify-between items-center bg-[#0B0B0B] z-[110]">
                                <span className="text-[#8A8A8A] text-[10px] tracking-widest uppercase">{selectedItem.id}</span>
                                <button onClick={() => setSelectedItem(null)} className="text-[#F2F2F2] p-2">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2">
                                        <path d="M18 6L6 18M6 6l12 12" />
                                    </svg>
                                </button>
                            </div>
                            
                            <div className="flex-1 flex items-center justify-center p-6 relative overflow-hidden bg-[#121212]">
                                <img src={selectedItem.path} className="w-full h-full object-contain max-h-[70vh] z-[10]" alt="Asset" />
                                
                                {/* --- 🛡️ 修正：浮水印層級 --- */}
                                <div className="watermark-overlay">
                                    <div className="watermark-text">DbSSTUDIO</div>
                                </div>
                            </div>
                            
                            <div className="p-10 border-t border-[#1a1a1a] bg-[#0B0B0B] z-[110]">
                                <h3 className="text-[#F2F2F2] text-xl font-light tracking-wide mb-1">{selectedItem.id}</h3>
                                <p className="text-[#8A8A8A] text-[11px] tracking-widest uppercase mb-10">Digital Masterpiece</p>
                                <button className="w-full bg-[#C6A96A] text-[#0B0B0B] py-4 text-[12px] tracking-widest uppercase font-medium">
                                    Acquire Design
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 5. 底部導覽列 */}
                    <nav className="bottom-nav">
                        <div className={`nav-btn ${page === 'archive' ? 'active' : ''}`} onClick={() => setPage('archive')}>
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2">
                                <rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" />
                                <rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" />
                            </svg>
                            <span className="text-[10px] font-medium tracking-tighter">ARCHIVE</span>
                        </div>
                        <div className={`nav-btn ${page === 'info' ? 'active' : ''}`} onClick={() => setPage('info')}>
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2">
                                <circle cx="12" cy="12" r="10" /><path d="M12 16v-4M12 8h.01" />
                            </svg>
                            <span className="text-[10px] font-medium tracking-tighter">ABOUT</span>
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
