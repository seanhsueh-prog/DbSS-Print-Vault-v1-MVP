<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="description" content="Print-Tested Graphics for Apparel Creators">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    
    <title>DbSS Print Vault v1.0</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* [DbSS Print Vault v1.0 - Core Layout Engine] */
        html, body, #root { 
            width: 100%; height: 100dvh; margin: 0; padding: 0; 
            overflow: hidden; background: #000; 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        .app-container { 
            width: 100%; max-width: 480px; height: 100%; 
            display: flex; flex-direction: column; 
            background: #fff; margin: 0 auto; position: relative; 
            box-shadow: 0 0 50px rgba(0,0,0,0.2);
        }

        :root {
            --sab: env(safe-area-inset-bottom);
            --sat: env(safe-area-inset-top);
        }

        /* Utilities */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* Global Smart Image Transition */
        .smart-img-base {
            opacity: 0; transition: opacity 0.2s ease, transform 0.3s ease;
        }
        .smart-img-base.loaded { opacity: 1; }

        /* Catalog Grid - Apparel Graphics Base (3/4 ratio) */
        .catalog-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 1px; background-color: #f0f0f0; padding-bottom: 100px;
        }
        .grid-item {
            background: #fff; aspect-ratio: 3/4; position: relative;
            cursor: pointer; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .grid-item img {
            width: 100%; height: 100%; object-fit: contain; padding: 12px;
            transition: transform 0.3s ease;
        }
        .grid-item:active img { transform: scale(0.92); }

        /* Nav & Tabs */
        .sticky-tabs {
            position: sticky; top: 0; z-index: 40; background: rgba(255,255,255,0.98);
            border-bottom: 1px solid #f0f0f0; 
            display: flex; overflow-x: auto;
            backdrop-filter: blur(8px);
        }
        .tab-btn {
            padding: 16px 20px; font-size: 11px; font-weight: 600; color: #a0a0a0;
            white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .tab-btn.active { color: #000; border-bottom-color: #000; }

        /* Bottom Nav */
        .bottom-nav {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(255,255,255,0.98); border-top: 1px solid #f0f0f0;
            display: flex; justify-content: space-evenly;
            padding-bottom: calc(16px + var(--sab)); padding-top: 16px; 
            z-index: 50; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React Framework -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 1. CONFIGURATION & DATA SCHEMA (DbSS Print Vault v1.0) ---
        // Refactored for Digital Assets / Apparel Graphics
        const CATEGORIES = [
            { id: 'si', label: 'Sumi Ink', fullName: 'Neo Sumi Ink', prefix: 'si', count: 18 },
            { id: 'gp', label: 'Graffiti', fullName: 'Graffiti Philosophy', prefix: 'gp', count: 18 },
            { id: 'sb', label: 'Skull Bloom', fullName: 'Dark Skull Bloom', prefix: 'sb', count: 15 },
            { id: 'af', label: 'Avant-Garde', fullName: 'Avant-Garde Fashion Ink', prefix: 'af', count: 15 },
            { id: 'at', label: 'Totems', fullName: 'Abstract Symbol Totems', prefix: 'at', count: 12 },
            { id: 'ml', label: 'Minimal', fullName: 'Minimal Line Graphics', prefix: 'ml', count: 12 }
        ];

        // Global asset specifications for Phase 1
        const ASSET_SPECS = {
            resolution: "4500 × 5400 px",
            dpi: "300 DPI",
            format: "Transparent PNG",
            usage: "Ready for Print-on-Demand",
            price: "$4.99"
        };

        // --- 2. BASE COMPONENTS ---
        const Icon = ({ name, size=20, className="" }) => {
            const paths = {
                x: <path d="M18 6L6 18M6 6l12 12" />,
                grid: <><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /></>,
                info: <><circle cx="12" cy="12" r="10" /><path d="M12 16v-4M12 8h.01" /></>,
                download: <><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" /></>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || null}
                </svg>
            );
        };

        // Smart Image component (Retained for robust local testing/fallback logic)
        const SmartImage = ({ prefix, index, suffix, className, onClick, style, onHide }) => {
            const [src, setSrc] = useState('');
            const [errorStep, setErrorStep] = useState(0);
            const [loaded, setLoaded] = useState(false);

            const candidates = useMemo(() => {
                const sIdx = String(index);
                // Priority: e.g., si001_d.png -> si0001_d.png -> si01_d.png -> si1_d.png
                return [
                    `./${prefix}${sIdx.padStart(3, '0')}${suffix}`,
                    `./${prefix}${sIdx.padStart(4, '0')}${suffix}`,
                    `./${prefix}${sIdx.padStart(2, '0')}${suffix}`,
                    `./${prefix}${index}${suffix}`
                ];
            }, [prefix, index, suffix]);

            useEffect(() => {
                setSrc(candidates[0]);
                setErrorStep(0);
                setLoaded(false);
            }, [candidates]);

            const handleError = () => {
                const next = errorStep + 1;
                if (next < candidates.length) {
                    setSrc(candidates[next]);
                    setErrorStep(next);
                } else {
                    if(onHide) onHide();
                }
            };

            return (
                <img 
                    src={src} 
                    className={`smart-img-base ${loaded ? 'loaded' : ''} ${className}`}
                    alt="" 
                    onClick={onClick}
                    onError={handleError}
                    onLoad={() => setLoaded(true)}
                    style={style}
                />
            );
        };

        const NavBtn = ({ icon, label, active, onClick }) => (
            <div className={`flex flex-col items-center gap-1.5 cursor-pointer transition-colors duration-300 w-20 ${active ? 'text-black' : 'text-gray-300 hover:text-gray-400'}`} onClick={onClick}>
                <Icon name={icon} size={22} strokeWidth={active ? 2 : 1.5} />
                <span className="text-[10px] font-bold tracking-widest">{label}</span>
            </div>
        );

        // Digital Asset Detail View (Redesigned from physical apparel logic)
        const AssetDetailView = ({ item, onClose }) => {
            const handlePurchase = () => {
                // Placeholder for external purchase link (Gumroad, Stripe, etc.)
                alert(`Redirecting to checkout for ${item.displayId}...\n\n(This is a placeholder for the actual payment link)`);
                // window.open(item.buyUrl, '_blank');
            };

            return (
                <div className="fixed inset-0 z-[60] bg-white flex flex-col fade-in">
                    <div className="absolute top-0 right-0 p-5 z-50">
                        <button onClick={onClose} className="bg-white/90 backdrop-blur rounded-full p-2.5 shadow-sm hover:scale-105 transition border border-gray-100">
                            <Icon name="x" size={20} />
                        </button>
                    </div>
                    
                    {/* Image Preview Area - Maximized for graphic details */}
                    <div className="flex-1 flex items-center justify-center p-6 bg-[#f8f9fa] relative overflow-hidden">
                         <div className="absolute inset-0 flex items-center justify-center opacity-[0.02] pointer-events-none">
                            <span className="text-9xl font-black tracking-tighter">VAULT</span>
                        </div>
                        <SmartImage 
                            prefix={item.prefix} 
                            index={item.rawIndex} 
                            suffix="_d.png" 
                            className="w-full h-full object-contain drop-shadow-2xl z-10 max-h-[55vh]" 
                        />
                    </div>

                    {/* Metadata & Purchase Area */}
                    <div className="bg-white px-6 pt-6 pb-[calc(24px+env(safe-area-inset-bottom))] border-t border-gray-100 slide-up">
                        <div className="mb-5 flex justify-between items-start">
                            <div>
                                <h2 className="text-2xl font-bold font-mono tracking-tight text-gray-900">{item.displayId}</h2>
                                <p className="text-xs text-gray-500 mt-1 uppercase tracking-wider font-medium">{item.categoryName}</p>
                            </div>
                            <div className="bg-gray-50 px-3 py-1.5 rounded-md border border-gray-100">
                                <span className="text-sm font-bold font-mono">{item.price}</span>
                            </div>
                        </div>

                        {/* Specs Table */}
                        <div className="bg-gray-50 rounded-lg p-4 mb-6 space-y-3 border border-gray-100">
                            <div className="flex justify-between items-center">
                                <span className="text-[11px] text-gray-500 font-medium uppercase tracking-wider">Resolution</span>
                                <span className="text-xs font-mono font-semibold text-gray-800">{item.specs.resolution}</span>
                            </div>
                            <div className="w-full h-px bg-gray-200/60"></div>
                            <div className="flex justify-between items-center">
                                <span className="text-[11px] text-gray-500 font-medium uppercase tracking-wider">Quality</span>
                                <span className="text-xs font-mono font-semibold text-gray-800">{item.specs.dpi}</span>
                            </div>
                            <div className="w-full h-px bg-gray-200/60"></div>
                            <div className="flex justify-between items-center">
                                <span className="text-[11px] text-gray-500 font-medium uppercase tracking-wider">Format</span>
                                <span className="text-xs font-mono font-semibold text-gray-800">{item.specs.format}</span>
                            </div>
                            <div className="w-full h-px bg-gray-200/60"></div>
                            <div className="flex justify-between items-center">
                                <span className="text-[11px] text-gray-500 font-medium uppercase tracking-wider">Usage</span>
                                <span className="text-[11px] font-semibold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded uppercase tracking-wide">{item.specs.usage}</span>
                            </div>
                        </div>

                        <button 
                            onClick={handlePurchase}
                            className="w-full bg-black text-white py-4 rounded-xl text-[13px] font-bold tracking-[0.05em] flex items-center justify-center gap-2.5 hover:bg-gray-900 active:scale-[0.98] transition-all shadow-lg shadow-gray-200">
                            <Icon name="download" size={16} />
                            <span>Buy This Design - {item.price}</span>
                        </button>
                    </div>
                </div>
            );
        };

        // --- 3. MAIN APPLICATION ---
        const App = () => {
            const [page, setPage] = useState('catalog');
            const [filter, setFilter] = useState('si');
            const [detailItem, setDetailItem] = useState(null);

            // Generate Catalog Data (Digital Assets)
            const catalog = useMemo(() => {
                let list = [];
                CATEGORIES.forEach(cat => {
                    for(let i=1; i<=cat.count; i++){
                        const formattedIndex = String(i).padStart(3, '0');
                        list.push({
                            uid: `${cat.id}-${i}`,
                            displayId: `${cat.prefix.toUpperCase()}-${formattedIndex}`,
                            categoryId: cat.id,
                            categoryName: cat.fullName,
                            prefix: cat.prefix,
                            rawIndex: i,
                            price: ASSET_SPECS.price,
                            specs: ASSET_SPECS,
                            buyUrl: "#" // Placeholder
                        });
                    }
                });
                return list;
            }, []);

            const filteredItems = useMemo(() => {
                return catalog.filter(c => c.categoryId === filter);
            }, [catalog, filter]);

            return (
                <div className="app-container pt-[var(--sat)]">
                    
                    {/* PAGE: CATALOG (DIGITAL VAULT) */}
                    {page === 'catalog' && (
                        <div className="flex flex-col h-full bg-[#f9f9f9]">
                            {/* Premium Brand Header */}
                            <div className="bg-white pt-8 pb-6 px-6 flex flex-col items-center text-center border-b border-gray-100 z-10 relative">
                                <h1 className="text-2xl font-black tracking-tighter mb-1 font-mono">DbSS Print Vault</h1>
                                <p className="text-[11px] text-gray-800 font-semibold tracking-wide uppercase mb-3">
                                    Print-Tested Graphics for Apparel Creators
                                </p>
                                <div className="flex items-center justify-center gap-2 text-[9px] text-gray-400 font-mono tracking-wider">
                                    <span>4500×5400px</span>
                                    <span>•</span>
                                    <span>300DPI</span>
                                    <span>•</span>
                                    <span>PNG</span>
                                </div>
                            </div>

                            {/* Sticky Category Tabs */}
                            <div className="sticky-tabs">
                                {CATEGORIES.map(t => (
                                    <button key={t.id} onClick={() => setFilter(t.id)} 
                                        className={`tab-btn ${filter === t.id ? 'active' : ''}`}>
                                        {t.label}
                                    </button>
                                ))}
                            </div>

                            {/* Catalog Grid */}
                            <div className="flex-1 overflow-y-auto no-scrollbar content-area">
                                <div className="catalog-grid">
                                    {filteredItems.map(item => (
                                        <div id={`cat-${item.uid}`} key={item.uid} className="grid-item group" onClick={() => setDetailItem(item)}>
                                            <SmartImage 
                                                prefix={item.prefix} 
                                                index={item.rawIndex} 
                                                suffix="_d.png" 
                                                className="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500"
                                                onHide={() => {
                                                    const el = document.getElementById(`cat-${item.uid}`);
                                                    if(el) el.style.display = 'none';
                                                }}
                                            />
                                            <div className="absolute bottom-1.5 left-0 w-full text-center">
                                                <span className="text-[9px] font-mono text-gray-400 bg-white/80 px-1.5 py-0.5 rounded backdrop-blur-sm">
                                                    {item.displayId}
                                                </span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="py-16 text-center bg-[#f0f0f0]">
                                    <div className="w-8 h-px bg-gray-300 mx-auto mb-4"></div>
                                    <span className="text-[10px] text-gray-400 tracking-[0.2em] font-medium">END OF CATEGORY</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* PAGE: INFO (ABOUT THE VAULT) */}
                    {page === 'info' && (
                        <div className="h-full flex flex-col items-center justify-center p-10 text-center bg-white fade-in">
                            <h1 className="text-3xl font-black tracking-tighter mb-2 font-mono">DbSS</h1>
                            <h2 className="text-sm font-bold tracking-widest mb-10 text-gray-800">PRINT VAULT</h2>
                            
                            <div className="w-12 h-0.5 bg-black mb-10"></div>
                            
                            <div className="space-y-6 max-w-[280px]">
                                <p className="text-[13px] text-gray-600 leading-relaxed font-medium">
                                    Premium, ready-to-print graphic assets curated strictly for apparel production.
                                </p>
                                <p className="text-[12px] text-gray-500 leading-relaxed font-light">
                                    Every design is optimized at 4500×5400 px, 300 DPI, provided as a transparent PNG to ensure flawless print-on-demand results.
                                </p>
                            </div>

                            <div className="mt-16 bg-gray-50 px-6 py-4 rounded-xl border border-gray-100">
                                <span className="text-[10px] text-gray-400 tracking-widest uppercase font-semibold">Version 1.0.0</span>
                            </div>
                        </div>
                    )}

                    {/* MODALS */}
                    {detailItem && <AssetDetailView item={detailItem} onClose={() => setDetailItem(null)} />}

                    {/* SIMPLIFIED NAVIGATION (Phase 1) */}
                    <div className="bottom-nav">
                        <NavBtn icon="grid" label="Catalog" active={page==='catalog'} onClick={()=>setPage('catalog')} />
                        <NavBtn icon="info" label="Info" active={page==='info'} onClick={()=>setPage('info')} />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // --- 4. SERVICE WORKER REGISTRATION ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('SW registered successfully:', registration.scope);
                    })
                    .catch(error => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
