<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0B0B0B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    
    <title>DbSS Print Vault v2.8</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 基礎環境 --- */
        html, body, #root { 
            width: 100%; height: 100dvh; margin: 0; padding: 0; 
            overflow: hidden; background: #0B0B0B; 
            font-family: 'Inter', sans-serif; color: #F2F2F2;
            -webkit-font-smoothing: antialiased;
        }
        .app-container { 
            width: 100%; max-width: 480px; height: 100%; 
            display: flex; flex-direction: column; 
            background: #0B0B0B; margin: 0 auto; position: relative; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- 1. 開場動畫 (滿版震撼) --- */
        .splash-layer {
            position: fixed; inset: 0; z-index: 9999;
            background: #0B0B0B; display: flex; align-items: center; justify-content: center;
            opacity: 1; pointer-events: auto;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .splash-layer.fade-out { opacity: 0; pointer-events: none; }
        .splash-img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
        }

        /* --- 2. 標誌與導覽 --- */
        .header-logo { height: 42px; object-fit: contain; margin-bottom: 8px; }
        
        .tab-bar {
            display: flex; width: 100%; border-bottom: 1px solid #1a1a1a;
            background: #0B0B0B; position: sticky; top: 0; z-index: 40;
            overflow-x: auto;
        }
        .tab-item {
            flex: 1; min-width: 80px; text-align: center; padding: 16px 12px; font-size: 10px;
            color: #8A8A8A; letter-spacing: 0.5px; cursor: pointer;
            transition: all 0.3s; text-transform: uppercase; white-space: nowrap;
        }
        .tab-item.active { color: #F2F2F2; border-bottom: 2px solid #C6A96A; }

        /* --- 3. 網格設計 (微光炭灰，救援黑色圖檔) --- */
        .main-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
            background: #1a1a1a; padding-bottom: 140px;
        }
        .grid-cell { 
            background: #1C1C1C; 
            aspect-ratio: 3/4; overflow: hidden; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .grid-cell img {
            width: 100%; height: 100%; object-fit: contain; padding: 12px;
            transition: opacity 0.4s ease, transform 0.3s ease; opacity: 0;
        }
        .grid-cell img.loaded { opacity: 1; }
        .grid-cell:active img { transform: scale(0.95); }

        /* --- 4. 浮水印鋼印 (智慧變色差值版：黑底變白、白底變黑) --- */
        .watermark-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; user-select: none;
            z-index: 999; /* 強制拉到最頂層 */
            mix-blend-mode: difference; /* 核心魔法屬性 */
            opacity: 0.18; /* 調整為 18% 透明度取得最佳反差平衡 */
        }
        .watermark-text {
            transform: rotate(-35deg);
            font-size: 13vw; font-weight: 800; letter-spacing: 0.15em;
            color: #ffffff; /* 必須搭配純白，difference 才會生效 */
            white-space: nowrap;
        }

        /* --- 5. 底部導覽列 --- */
        .bottom-nav {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(11, 11, 11, 0.98); border-top: 1px solid #1a1a1a;
            display: flex; justify-content: space-evenly;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
            padding-top: 16px; z-index: 60;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .nav-btn {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            color: #8A8A8A; transition: color 0.3s; cursor: pointer;
        }
        .nav-btn.active { color: #C6A96A; }

        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [config, setConfig] = useState(null);
            const [artworks, setArtworks] = useState([]);
            
            const [page, setPage] = useState('archive');
            const [filter, setFilter] = useState('');
            const [splashActive, setSplashActive] = useState(true);
            const [splashFade, setSplashFade] = useState(false);
            const [selectedItem, setSelectedItem] = useState(null);

            useEffect(() => {
                fetch('./data.json?v=' + new Date().getTime())
                    .then(res => res.json())
                    .then(data => {
                        setConfig(data.metadata);
                        setArtworks(data.artworks);
                        if (data.metadata.categories.length > 0) {
                            setFilter(data.metadata.categories[0].id);
                        }
                    })
                    .catch(err => console.error("Manifest Load Error:", err));

                const t1 = setTimeout(() => setSplashFade(true), 2000);
                const t2 = setTimeout(() => setSplashActive(false), 2800);
                return () => { clearTimeout(t1); clearTimeout(t2); };
            }, []);

            const filteredArtworks = useMemo(() => {
                return artworks.filter(art => art.category === filter);
            }, [artworks, filter]);

            if (!config) return <div className="app-container"></div>;

            return (
                <div className="app-container pt-[env(safe-area-inset-top)]">
                    
                    {splashActive && (
                        <div className={`splash-layer ${splashFade ? 'fade-out' : ''}`}>
                            <img src="./splash-dbss.png" className="splash-img" alt="DbSS" />
                        </div>
                    )}

                    {page === 'archive' && (
                        <>
                            <header className="pt-8 pb-5 flex flex-col items-center">
                                <img src="./logo-dbss.png" className="header-logo" alt="DbSS" />
                                <span className="text-[9px] tracking-[0.2em] text-[#8A8A8A] uppercase font-light">Archive Foundation</span>
                            </header>

                            <nav className="tab-bar no-scrollbar">
                                {config.categories.map(cat => (
                                    <div key={cat.id} 
                                         onClick={() => setFilter(cat.id)}
                                         className={`tab-item ${filter === cat.id ? 'active' : ''}`}>
                                        {cat.label}
                                    </div>
                                ))}
                            </nav>

                            <main className="flex-1 overflow-y-auto no-scrollbar">
                                <div className="main-grid">
                                    {filteredArtworks.map((item, i) => {
                                        const catMeta = config.categories.find(c => c.id === item.category);
                                        const imgPath = `./artworks/${catMeta.folder}/${item.placement}/${item.filename}`;
                                        
                                        return (
                                            <div key={item.id || i} className="grid-cell" onClick={() => setSelectedItem(item)}>
                                                <img 
                                                    src={imgPath} 
                                                    loading="lazy"
                                                    onLoad={(e) => e.target.classList.add('loaded')}
                                                    onError={(e) => { e.target.style.opacity = '0.1'; }} 
                                                />
                                            </div>
                                        );
                                    })}
                                </div>
                            </main>
                        </>
                    )}

                    {page === 'info' && (
                        <div className="flex-1 flex flex-col items-center justify-center p-12 text-center fade-in">
                            <img src="./logo-dbss.png" className="h-10 mb-12 opacity-90" />
                            <div className="w-8 h-[1px] bg-[#C6A96A] mb-12"></div>
                            <p className="text-[13px] text-[#F2F2F2] leading-relaxed font-light tracking-wide mb-6">
                                DbSS STUDIO: Premium Design Archive for visionary apparel creators.
                            </p>
                            <p className="text-[11px] text-[#8A8A8A] leading-relaxed font-light">
                                Optimized at 4500x5400 px / 300 DPI.<br/>
                                Built for high-performance garment printing.
                            </p>
                            <div className="mt-20 py-2 px-6 border border-[#1a1a1a] rounded-full">
                                <span className="text-[9px] text-[#555] tracking-widest uppercase">Version 2.8.0 (DAM)</span>
                            </div>
                        </div>
                    )}

                    {selectedItem && (() => {
                        const catMeta = config.categories.find(c => c.id === selectedItem.category);
                        const placeMeta = config.placements[selectedItem.placement];
                        const imgPath = `./artworks/${catMeta.folder}/${selectedItem.placement}/${selectedItem.filename}`;

                        return (
                            <div className="fixed inset-0 z-[100] bg-[#0B0B0B] fade-in flex flex-col">
                                <div className="p-6 flex justify-between items-center bg-[#0B0B0B] z-[110]">
                                    <span className="text-[#8A8A8A] text-[10px] tracking-widest uppercase">{selectedItem.id}</span>
                                    <button onClick={() => setSelectedItem(null)} className="text-[#F2F2F2] p-2">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2">
                                            <path d="M18 6L6 18M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>
                                
                                <div className="flex-1 flex items-center justify-center p-6 relative overflow-hidden bg-[#141414]">
                                    <img src={imgPath} className="w-full h-full object-contain max-h-[65vh] z-[10]" alt="Asset" />
                                    {/* 這是我們的新魔法浮水印 */}
                                    <div className="watermark-overlay">
                                        <div className="watermark-text">DbSSTUDIO</div>
                                    </div>
                                </div>
                                
                                <div className="p-8 border-t border-[#1a1a1a] bg-[#0B0B0B] z-[110]">
                                    <h3 className="text-[#F2F2F2] text-[16px] font-mono tracking-wider mb-1 truncate">{selectedItem.filename}</h3>
                                    <p className="text-[#C6A96A] text-[10px] tracking-widest uppercase mb-5">{placeMeta.label}</p>
                                    
                                    <div className="bg-[#121212] rounded p-4 mb-6 border border-[#1a1a1a]">
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="text-[#666] text-[9px] uppercase tracking-widest">Recommended Use</span>
                                            <span className="text-[#F2F2F2] text-[10px] tracking-wide">{placeMeta.recommendedUse}</span>
                                        </div>
                                        <div className="flex justify-between items-center">
                                            <span className="text-[#666] text-[9px] uppercase tracking-widest">Suggested Width</span>
                                            <span className="text-[#F2F2F2] text-[10px] tracking-wide font-mono">{placeMeta.suggestedWidth}</span>
                                        </div>
                                    </div>

                                    <button className="w-full bg-[#C6A96A] text-[#0B0B0B] py-4 text-[12px] tracking-widest uppercase font-semibold">
                                        Acquire Asset
                                    </button>
                                </div>
                            </div>
                        );
                    })()}

                    <nav className="bottom-nav">
                        <div className={`nav-btn ${page === 'archive' ? 'active' : ''}`} onClick={() => setPage('archive')}>
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2">
                                <rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" />
                                <rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" />
                            </svg>
                            <span className="text-[10px] font-medium tracking-tighter">ARCHIVE</span>
                        </div>
                        <div className={`nav-btn ${page === 'info' ? 'active' : ''}`} onClick={() => setPage('info')}>
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2">
                                <circle cx="12" cy="12" r="10" /><path d="M12 16v-4M12 8h.01" />
                            </svg>
                            <span className="text-[10px] font-medium tracking-tighter">ABOUT</span>
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js');
            });
        }
    </script>
</body>
</html>
