<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0B0B0B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Premium Archive Assets by DbSS STUDIO">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    
    <title>DbSS Print Vault</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Core Engine - DbSS Dark Aesthetic */
        html, body, #root { 
            width: 100%; height: 100dvh; margin: 0; padding: 0; 
            overflow: hidden; background: #0B0B0B; 
            font-family: 'Inter', sans-serif;
            color: #F2F2F2;
            -webkit-font-smoothing: antialiased;
        }
        .app-container { 
            width: 100%; max-width: 480px; height: 100%; 
            display: flex; flex-direction: column; 
            background: #0B0B0B; margin: 0 auto; position: relative; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Splash Screen (v2.4 Zero-Flash Logic) */
        .splash-layer {
            position: fixed; inset: 0; z-index: 9999;
            background: #0B0B0B; display: flex; align-items: center; justify-content: center;
            opacity: 1; /* Always visible initially to block home page */
            pointer-events: auto;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .splash-layer.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .splash-img { width: 100%; height: 100%; object-fit: contain; padding: 10%; }

        /* Header Logo */
        .header-logo {
            height: 40px; /* Strong presence */
            object-fit: contain; margin-bottom: 8px; opacity: 0.95;
        }

        /* Navigation Tabs */
        .tab-bar {
            display: flex; width: 100%; border-bottom: 1px solid #1a1a1a;
            background: rgba(11, 11, 11, 0.98); backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 40;
        }
        .tab-item {
            flex: 1; text-align: center; padding: 16px 0; font-size: 11px;
            color: #8A8A8A; transition: all 0.3s; letter-spacing: 0.5px;
            cursor: pointer;
        }
        .tab-item.active { color: #F2F2F2; border-bottom: 2px solid #C6A96A; }

        /* Content Grid (Guaranteed Visibility) */
        .main-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
            background: #1a1a1a; padding-bottom: 120px;
        }
        .grid-cell { 
            background: #141414; /* Micro-glow backplate */
            aspect-ratio: 3/4; overflow: hidden; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .grid-cell img {
            width: 100%; height: 100%; object-fit: contain; padding: 8px;
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 0; /* Hidden until loaded */
        }
        .grid-cell img.loaded { opacity: 1; }
        .grid-cell:active img { transform: scale(0.95); }

        /* Modal Animation */
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Digital Watermark */
        .digital-watermark {
            position: absolute; right: 24px; bottom: 24px;
            font-family: 'Inter', sans-serif; font-weight: 300;
            font-size: 14px; letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.25);
            pointer-events: none;
            user-select: none;
            transform: rotate(-5deg);
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CATEGORIES = [
            { id: 'li', label: 'Line Art', prefix: 'li', count: 18 },
            { id: 'in', label: 'Ink Art', prefix: 'in', count: 18 },
            { id: 'ch', label: 'Characters', prefix: 'ch', count: 15 },
            { id: 'an', label: 'Anime', prefix: 'an', count: 15 },
            { id: 'am', label: 'Animals', prefix: 'am', count: 12 }
        ];

        const App = () => {
            const [filter, setFilter] = useState('li');
            const [splashState, setSplashState] = useState('visible'); // visible -> fade-out -> removed
            const [selectedItem, setSelectedItem] = useState(null);

            useEffect(() => {
                // Splash Timeline: Total ~2.3 seconds
                const timerOut = setTimeout(() => setSplashState('fade-out'), 1800);
                const timerRemove = setTimeout(() => setSplashState('removed'), 2600);

                return () => { clearTimeout(timerOut); clearTimeout(timerRemove); };
            }, []);

            return (
                <div className="app-container pt-[env(safe-area-inset-top)]">
                    
                    {/* 1. SPLASH SCREEN (Starts solid to prevent flashing) */}
                    {splashState !== 'removed' && (
                        <div className={`splash-layer ${splashState === 'fade-out' ? 'fade-out' : ''}`}>
                            <img src="./splash-dbss.png" className="splash-img" alt="DbSS" 
                                 onError={(e) => { e.target.style.opacity = '0'; }} />
                        </div>
                    )}

                    {/* 2. HEADER */}
                    <header className="pt-8 pb-5 flex flex-col items-center bg-[#0B0B0B] z-10 relative">
                        <img src="./logo-dbss.png" className="header-logo" alt="DbSS STUDIO" 
                             onError={(e) => { e.target.style.opacity = '0'; }} />
                        <span className="text-[9px] tracking-[0.2em] text-[#8A8A8A] uppercase font-light">
                            Archive Foundation
                        </span>
                    </header>

                    {/* 3. TABS */}
                    <nav className="tab-bar">
                        {CATEGORIES.map(cat => (
                            <div key={cat.id} 
                                 onClick={() => setFilter(cat.id)}
                                 className={`tab-item ${filter === cat.id ? 'active' : ''}`}>
                                {cat.label}
                            </div>
                        ))}
                    </nav>

                    {/* 4. CONTENT GRID (No-Hide Policy) */}
                    <main className="flex-1 overflow-y-auto no-scrollbar">
                        <div className="main-grid">
                            {[...Array(CATEGORIES.find(c => c.id === filter).count)].map((_, i) => {
                                const id = i + 1;
                                const imgPath = `./${filter}${String(id).padStart(3, '0')}_d.png`;
                                return (
                                    <div key={i} className="grid-cell" onClick={() => setSelectedItem({ path: imgPath, id: `${filter.toUpperCase()}-${String(id).padStart(3, '0')}` })}>
                                        <img src={imgPath} 
                                             onLoad={(e) => e.target.classList.add('loaded')}
                                             onError={(e) => {
                                                 // If path 1 fails, try simplified path
                                                 const fallback = `./${filter}${id}_d.png`;
                                                 if (e.target.src.includes(imgPath)) {
                                                     e.target.src = fallback;
                                                 } else {
                                                     e.target.style.opacity = '0'; // Keep frame, hide image
                                                 }
                                             }} />
                                    </div>
                                );
                            })}
                        </div>
                        <div className="py-16 text-center bg-[#0B0B0B]">
                            <div className="w-6 h-[1px] bg-[#1a1a1a] mx-auto mb-4"></div>
                            <span className="text-[9px] text-[#8A8A8A] tracking-widest uppercase font-light">End of Archive</span>
                        </div>
                    </main>

                    {/* 5. DETAIL MODAL */}
                    {selectedItem && (
                        <div className="fixed inset-0 z-[100] bg-[#0B0B0B] fade-in flex flex-col">
                            <div className="p-6 flex justify-between items-center bg-gradient-to-b from-[#0B0B0B] to-transparent z-10">
                                <span className="text-[#8A8A8A] text-[10px] tracking-widest uppercase">{selectedItem.id}</span>
                                <button onClick={() => setSelectedItem(null)} className="text-[#F2F2F2] p-2 hover:opacity-70 transition">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round">
                                        <path d="M18 6L6 18M6 6l12 12" />
                                    </svg>
                                </button>
                            </div>
                            
                            <div className="flex-1 flex items-center justify-center p-6 relative overflow-hidden bg-[#0F0F0F]">
                                <img src={selectedItem.path} className="w-full h-full object-contain max-h-[70vh]" alt="Detail" />
                                <div className="digital-watermark">DbSSTUDIO</div>
                            </div>
                            
                            <div className="px-8 pt-8 pb-[calc(32px+env(safe-area-inset-bottom))] bg-[#0B0B0B] border-t border-[#1a1a1a]">
                                <div className="flex justify-between items-end mb-8">
                                    <div>
                                        <h3 className="text-[#F2F2F2] text-xl font-light tracking-wide">{selectedItem.id}</h3>
                                        <p className="text-[#8A8A8A] text-[11px] tracking-[0.2em] uppercase mt-2">Premium Asset</p>
                                    </div>
                                    <span className="text-[#C6A96A] text-lg font-light tracking-wide">$4.99</span>
                                </div>
                                <button className="w-full bg-[#C6A96A] text-[#0B0B0B] py-4 rounded-sm text-[12px] tracking-[0.2em] uppercase font-medium">
                                    Acquire Design
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').then(() => console.log('v2.4 Ready'));
            });
        }
    </script>
</body>
</html>
