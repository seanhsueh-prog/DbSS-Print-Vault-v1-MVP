name: Auto-Generate Artwork Manifest

# 當 artworks 資料夾內有檔案變動時，自動觸發機器人
on:
  push:
    paths:
      - 'artworks/**'
  workflow_dispatch: # 允許您在網頁上手動按按鈕觸發

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: 執行掃描腳本 (Run Manifest Generator)
      run: node build-manifest.js

    - name: 自動提交新的 data.json (Commit and Push changes)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "DbSS Auto Bot"
        git add data.json
        git commit -m "🤖 自動更新圖檔清單 (Auto-updated data.json)" || echo "No changes to commit"
        git push
